<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>VAS HMI-C</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="QVAS">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <style>
    /* Loading screen - shown until app.js initializes */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #loading-screen.hidden {
      display: none;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 18px;
      font-weight: 500;
      text-align: center;
    }
    .loading-subtext {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 10px;
    }
    
    /* Error screen */
    #error-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ff4444;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      color: white;
      font-family: monospace;
      padding: 20px;
      text-align: center;
    }
    .error-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .error-message {
      font-size: 14px;
      margin: 10px 0;
      max-width: 600px;
    }
  </style>
  <script>
    // Startup detection - prevent white screen
    const startupTime = performance.now();
    console.log('✅ Page startup - HEAD_LOADED');
    
    // Global error handler
    window.addEventListener('error', (event) => {
      console.error('❌ Global error:', event.error);
      showError(`JavaScript Error: ${event.error.message}`, event.error.stack);
    });
    
    window.addEventListener('unhandledrejection', (event) => {
      console.error('❌ Unhandled rejection:', event.reason);
      showError('Unhandled Promise Rejection', event.reason);
    });
    
    function showError(title, message) {
      const errorScreen = document.getElementById('error-screen');
      if (errorScreen) {
        document.querySelector('.error-title').textContent = title;
        document.querySelector('.error-message').textContent = String(message).substring(0, 200);
        errorScreen.style.display = 'flex';
      }
    }
    
    function hideLoadingScreen() {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
      }
      const elapsed = (performance.now() - startupTime).toFixed(0);
      console.log(`✅ App initialized in ${elapsed}ms`);
    }
    
    // Timeout safety - if app doesn't initialize in 10 seconds, show error
    setTimeout(() => {
      if (!document.getElementById('loading-screen')?.classList.contains('hidden')) {
        console.error('App startup timeout');
        showError('Startup Timeout', 'App failed to initialize. Check console for errors.');
      }
    }, 10000);
  </script>

  <script>
    // QVAS iPhone full-screen fit helper.
    // Measures the real QVAS panel height, then scales it to fit the iPhone screen.
    (function () {
      function isQvasCoreNode(el) {
        if (!el || el.nodeType !== 1) return false;
        if (el.id === 'loading-screen' || el.id === 'error-screen' || el.id === 'qvas-fit-root') return false;
        if (el.classList && el.classList.contains('qvas-audio-unlock')) return false;
        if (el.tagName === 'SCRIPT' || el.tagName === 'STYLE' || el.tagName === 'LINK' || el.tagName === 'META' || el.tagName === 'TITLE') return false;
        return true;
      }

      function ensureQvasFitRoot() {
        let root = document.getElementById('qvas-fit-root');
        if (root) return root;
        root = document.createElement('div');
        root.id = 'qvas-fit-root';
        const children = Array.from(document.body.children).filter(isQvasCoreNode);
        if (children.length) {
          document.body.insertBefore(root, children[0]);
          children.forEach(child => root.appendChild(child));
        } else {
          document.body.appendChild(root);
        }
        return root;
      }

      function viewportSize() {
        const vv = window.visualViewport;
        return {
          width: Math.max(1, vv ? vv.width : (window.innerWidth || document.documentElement.clientWidth || 1024)),
          height: Math.max(1, vv ? vv.height : (window.innerHeight || document.documentElement.clientHeight || 480))
        };
      }

      function readSafeInsets() {
        // CSS env() is not readable directly, so use a tiny hidden probe.
        let probe = document.getElementById('qvas-safe-probe');
        if (!probe) {
          probe = document.createElement('div');
          probe.id = 'qvas-safe-probe';
          probe.style.cssText = 'position:fixed;left:-9999px;bottom:0;height:0;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);visibility:hidden;pointer-events:none;';
          document.body.appendChild(probe);
        }
        const cs = getComputedStyle(probe);
        return {
          top: parseFloat(cs.paddingTop) || 0,
          bottom: parseFloat(cs.paddingBottom) || 0
        };
      }

      function measureDesignSize(root) {
        const oldTransform = root.style.transform;
        const oldWidth = root.style.width;
        const oldHeight = root.style.height;

        root.style.transform = 'none';
        root.style.width = 'auto';
        root.style.height = 'auto';

        // Use the actual rendered content size, not a guessed 480px height.
        const rect = root.getBoundingClientRect();
        const width = Math.ceil(Math.max(root.scrollWidth, rect.width, 1024));
        const height = Math.ceil(Math.max(root.scrollHeight, rect.height, 620));

        root.style.transform = oldTransform;
        root.style.width = oldWidth;
        root.style.height = oldHeight;

        return { width, height };
      }

      function fitQvasToScreen() {
        const root = ensureQvasFitRoot();
        const viewport = viewportSize();
        const isSmall = viewport.width < 950 || viewport.height < 650;
        const safe = readSafeInsets();
        const design = measureDesignSize(root);

        // Small safety margin keeps the bottom row visible on iPhone landscape.
        const marginX = isSmall ? 10 : 0;
        const marginTop = isSmall ? Math.max(4, safe.top) : 0;
        const marginBottom = isSmall ? Math.max(18, safe.bottom + 12) : 0;
        const availableWidth = Math.max(1, viewport.width - marginX * 2);
        const availableHeight = Math.max(1, viewport.height - marginTop - marginBottom);
        const scale = Math.min(availableWidth / design.width, availableHeight / design.height);
        const offsetX = Math.max(marginX, (viewport.width - design.width * scale) / 2);
        const offsetY = Math.max(marginTop, (viewport.height - marginBottom - design.height * scale) / 2);

        document.documentElement.classList.toggle('qvas-fit-enabled', isSmall);
        document.documentElement.classList.toggle('qvas-small-screen', isSmall);
        document.documentElement.style.setProperty('--qvas-design-width', design.width + 'px');
        document.documentElement.style.setProperty('--qvas-design-height', design.height + 'px');
        document.documentElement.style.setProperty('--qvas-fit-scale', String(scale));
        document.documentElement.style.setProperty('--qvas-fit-x', offsetX + 'px');
        document.documentElement.style.setProperty('--qvas-fit-y', offsetY + 'px');

        root.style.setProperty('--qvas-design-width', design.width + 'px');
        root.style.setProperty('--qvas-design-height', design.height + 'px');
        root.style.setProperty('--qvas-fit-scale', String(scale));
        root.style.setProperty('--qvas-fit-x', offsetX + 'px');
        root.style.setProperty('--qvas-fit-y', offsetY + 'px');
      }

      document.addEventListener('DOMContentLoaded', () => {
        ensureQvasFitRoot();
        fitQvasToScreen();
        setTimeout(fitQvasToScreen, 250);
        setTimeout(fitQvasToScreen, 1000);
        setTimeout(fitQvasToScreen, 2000);
      });
      window.addEventListener('resize', fitQvasToScreen);
      window.addEventListener('orientationchange', () => setTimeout(fitQvasToScreen, 350));
      if (window.visualViewport) window.visualViewport.addEventListener('resize', fitQvasToScreen);
    })();
  </script>

  <script src="app.js"></script>
  <script>
    // Hide loading screen once app is ready
    document.addEventListener('DOMContentLoaded', hideLoadingScreen);
    // Also call it after a short delay as fallback
    setTimeout(hideLoadingScreen, 100);
  </script>
</body>
</html>
